name: Reindex Trigger

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  trigger:
    runs-on: ubuntu-latest
    env:
      RG: ${{ vars.RESOURCE_GROUP }}
      JOB_NAME: ${{ vars.REINDEX_JOB_NAME }}
    steps:
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Start reindex job
        run: |
          az containerapp job start \
            --name "$JOB_NAME" \
            --resource-group "$RG"
